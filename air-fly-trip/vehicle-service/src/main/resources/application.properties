spring.application.name=vehicle-service
server.port=8084
spring.profiles.active=local

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

services.terminal.url=${SERVICES_TERMINAL_URL:http://localhost:8083}
services.charging-station.url=${SERVICES_CHARGING_STATION_URL:http://localhost:8091}

app.jwt.secret=${APP_JWT_SECRET:airflytrip-2026-jwt-secret-development-key-for-local-microservices}
