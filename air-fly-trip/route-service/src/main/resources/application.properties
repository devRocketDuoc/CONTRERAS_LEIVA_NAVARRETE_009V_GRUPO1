spring.application.name=route-service
server.port=8084
spring.profiles.active=local

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration\nspring.flyway.baseline-on-migrate=true\n\nlogging.level.org.hibernate.SQL=DEBUG\nlogging.level.org.hibernate.orm.jdbc.bind=TRACE

app.jwt.secret=${APP_JWT_SECRET:airflytrip-2026-jwt-secret-development-key-for-local-microservices}
